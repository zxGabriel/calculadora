<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora</title>
    <link rel="stylesheet" href="/styles/reset.css">
    <link rel="stylesheet" href="/styles/style.css">
</head>
<body>
    <main class="general_wrapper">
        <header class="cabecalho"> 
            <h1 class="cabecalho_titulo">Calculadora</h1>
            <p class="cabecalho_texto"> Utilizando vanilla Javascript</p>
        </header>
        <section class="tela">
            
            <div class="tela_operacao">
            <p class="tela_armazem"></p>
           <h2 class="tela_numero_principal"></h2> 
        </div>
            <ul class="teclado_lista">
            <div class="numeros_container container_tela">
                <li class="teclado_lista_item"> <input type="button" class="teclas teclas_numeros" value="0"></li>
                <li class="teclado_lista_item"> <input type="button" class="teclas teclas_numeros" value="1"></li>
                <li class="teclado_lista_item"> <input type="button" class="teclas teclas_numeros" value="2"></li>
                <li class="teclado_lista_item"> <input type="button" class="teclas teclas_numeros" value="3"></li>
                <li class="teclado_lista_item"> <input type="button" class="teclas teclas_numeros" value="4"></li>
                <li class="teclado_lista_item"> <input type="button" class="teclas teclas_numeros" value="5"></li>
                <li class="teclado_lista_item"> <input type="button" class="teclas teclas_numeros" value="6"></li>
                <li class="teclado_lista_item"> <input type="button" class="teclas teclas_numeros" value="7"></li>
                <li class="teclado_lista_item"> <input type="button" class="teclas teclas_numeros" value="8"></li>
                <li class="teclado_lista_item"> <input type="button" class="teclas teclas_numeros" value="9"></li>
                <li class="teclado_lista_item"> <input type="button" class="teclas tecla_decimal" value="."></li>
            </div>
            <div class="operadores_container container_tela">
                <li class="teclado_lista_item"> <input type="button" class="teclas teclas_operadores" value="+"></li>
                <li class="teclado_lista_item"> <input type="button" class="teclas teclas_operadores" value="-"></li>
                <li class="teclado_lista_item"> <input type="button" class="teclas teclas_operadores" value="*"></li>
                <li class="teclado_lista_item"> <input type="button" class="teclas teclas_operadores" value="/"></li>
                <li class="teclado_lista_item"> <input type="button" class="teclas teclas_operadores" value="**"></li>
            </div>
            <div class="especiais_container container_tela">
                <li class="teclado_lista_item"> <input type="reset" class="teclas tecla_inverte" value="±"></li>
                <li class="teclado_lista_item"> <input type="reset" class="teclas tecla_back" value="⌫"></li>
                <li class="teclado_lista_item"> <input type="reset" class="teclas tecla_clear" value="c"></li>
                <li class="teclado_lista_item"> <input type="submit" class="teclas tecla_resultado" value="="></li>
            </div>
            </ul>
       
        </section> 



    <footer class="rodape">
        <h2 class="rodape_titulo">Desenvolvido por <strong class="destaque">Gabriel</strong> </h2>
    </footer>
</main>

    <script src="main.js"></script>
</body>
</html>
